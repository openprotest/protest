name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 20 * * 5'

jobs:
  build:
    name: Build and test

    runs-on: windows-latest

    strategy:
      matrix:
        dotnet: [ "9.0.x", "10.0.x" ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet }}

    - name: Restore dependencies
      run: dotnet restore OpenProtest.slnx

    - name: Build
      run: dotnet build OpenProtest.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test OpenProtest.slnx --no-build --verbosity normal