<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Pro-test</title>
	<meta name="theme-color" content="#E87600"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<meta name="description" content="A management base for System Admins"/>
	<style>
		body {
			border: 0;
			margin: 0;
			background-color: #404040;
			font-family: "Segoe UI";
			color: #c0c0c0;
			text-align: center;
			overflow: auto;
			-webkit-user-select: none; user-select: none;
			display: block;
		}

		#locklatch {
			transform: translateY(22px);
			transition-duration: 1s;
			animation: lock 1.5s 1;
		}

		img {
			padding: 0px 8px;
			margin-bottom: -8px;
			transition: .2s;
		}

		#messageLabel {
			display: inline-block;
			color: #E87600;
			font-weight: bold;
			visibility: hidden;
			margin-bottom: 12px;
		}

		input {
			border: 0;
			outline: 0;
			background-color: #c0c0c0;
			color: #404040;
			font-size: 14px;
			transition: .2s;
		}

		input[type="text"],
		input[type="password"] {
			width: 180px;
			height: 34px;
			border-radius: 4px;
			padding: 0px 8px;
			margin-top: 4px;
			margin-bottom: 4px;
			margin-right: 40px;
		}

		input[type="password"]::-ms-reveal {
			display: none;
		}

		input[type="button"] {
			border-radius: 8px;
			margin-top: 12px;
			width: 100px;
			height: 36px;
			transition-duration: filter .2s, box-shadow .2s, opacity .4s;
			opacity: 0;
			font-weight: bold;
			transition: .4s;
		}
		input[type="button"]:disabled {
			color: rgb(176,176,176);
			background-color: rgb(96,96,96) !important;
			filter: contrast(60%) brightness(80%) !important;
		}
		input[type="button"]:hover{
			filter: brightness(110%);
		}
		
		.glow > * {
			transition: .4s;
		}

		.glow:focus-within > img,
		.glow:focus-within > input,
		input[type="button"]:focus {
			filter: brightness(130%) drop-shadow(0 0 2px rgba(255,255,255,.8));
		}
		input[type="button"]:active {
			filter: brightness(150%) drop-shadow(0 0 8px rgba(255,255,255,.8));
		}

		@keyframes otp-in {
			0%   { opacity:0; height:0; }
			40%  { opacity:0; height:40px; }
			100% { opacity:1; height:40px; }
		}

		@keyframes enroll-in {
			0%   { opacity:0; transform: translateY(-20px); }
			100% { opacity:1; transform: translateY(0px); }
		}

		@keyframes lock {
			0%   { transform: translateY(0px); }
			50%  { transform: translateY(0px); }
			90%  { transform: translateY(27px); }
			100% { transform: translateY(22px); }
		}

		@keyframes shake {
			10%, 90% { transform: translateX(-1px); }
			20%, 80% { transform: translateX(2px); }
			30%, 50%, 70% { transform: translateX(-4px); }
			40%, 60% { transform: translateX(4px); }
		}

		@keyframes fail {
			0%   { transform: translateY(22px); }
			50%  { transform: translateY(26px); }
			100% { transform: translateY(22px); }
		}
	</style>
</head>

<body>
	<br>
	<svg width="250" height="250" aria-hidden="true">
		<path id="locklatch" fill="#E87600" d="M177.904,26.714C163.172,12.238,145.535,5,125.005,5C104.469,5,86.831,12.238,72.1,26.714 C57.367,41.188,50,58.52,50,78.7V135h32.133V78.7c0-11.627,4.183-21.55,12.558-29.779c8.368-8.225,18.47-12.336,30.295-12.336 c11.83,0,21.939,4.111,30.312,12.336c8.369,8.229,12.558,18.152,12.558,29.779v28.346H200V78.7 C200,58.52,192.634,41.188,177.904,26.714z" />
		<path id="lockbody" fill="#E87600" d="M202.167,129H47.833C37.984,129,30,136.211,30,145.104v87.792c0,8.893,7.984,16.104,17.833,16.104h154.334 c9.849,0,17.833-7.211,17.833-16.104v-87.791C220,136.212,212.016,129,202.167,129z" />
	</svg>
	<br>
	<div id="messageLabel">Sorry, I don't like this password.</div>
	<br>
	<div class="glow">
		<img src="mono/user.svg?light" title="Username" width="28" height="28">
		<input type="text" id="usernameInput" aria-label="Username" autocomplete="off" autofocus>
	</div>
	<div class="glow">
		<img src="mono/credential.svg?light" title="Password" width="28" height="28">
		<input type="password" id="passwordInput" aria-label="Password" autocomplete="off">
	</div>
	<div class="glow" id="otpBox" style="display:none; animation:otp-in .8s 1 forwards;">
		<img src="mono/mfa.svg?light" title="OTP" width="28" height="28">
		<input type="text" id="otpInput" aria-label="One time password" autocomplete="off" maxlength="6" style="font-size:16px; font-weight:bold; font-family:monospace; text-align:center; letter-spacing:12px;">
	</div>

	<input id="loginButton" type="button" value="Login"/>

	<noscript>
		<div style="position:sticky;padding:16px;text-align:center;background-color:#202020;color:#c0c0c0">Javascript is either disabled or not supported by your browser.</div>
	</noscript>

	<script>
		let status = 1;
		let token = null;
		usernameInput.value = localStorage.getItem("last_username");
		usernameInput.onkeyup = event=> {
			if (event.key==="Enter") passwordInput.focus();
		};

		passwordInput.onkeyup = otpInput.onkeyup = event=> {
			if (event.key==="Enter") Login();
		};

		usernameInput.oninput = usernameInput.onchange = passwordInput.oninput = passwordInput.onchange = event=> {
			loginButton.style.opacity = usernameInput.value === "" || passwordInput.value === "" ? "0" : "1";
		};

		if (usernameInput.value.length === 0) {
			usernameInput.focus();
		}
		else {
			passwordInput.focus();
		}

		loginButton.onclick = ()=>Login();
		
		let busy = false;
		const Login = async ()=> {
			if (busy) return;

			switch (status) {
			//case -1: await TotpEnrollment(); break;
			case 1: await PrimaryLogin(); break;
			case 2: await SecondaryLogin(); break;
			}
		};

		const HandleResponse = json => {
			if (json.status === -1) { //enrollment required
				usernameInput.style.display = "none";
				passwordInput.style.display = "none";
				loginButton.style.display = "none";

				const enrollmentBox = document.createElement("div");
				enrollmentBox.style.backgroundColor = "rgb(224,224,224)";
				enrollmentBox.style.position = "absolute";
				enrollmentBox.style.width = "500px";
				enrollmentBox.style.height = "500px";
				enrollmentBox.style.left = "calc(50% - 250px)";
				enrollmentBox.style.top = "20px";
				enrollmentBox.style.border = "1px solid rgb(224,224,224)";
				enrollmentBox.style.borderRadius = "8px";
				enrollmentBox.style.animation = "enroll-in .8s 1 forwards";
				document.body.appendChild(enrollmentBox);

				const enrollTitle = document.createElement("div");
				enrollTitle.textContent = "Scan this QR code with your OTP app to enroll.";
				enrollTitle.style.color = "#202020";
				enrollTitle.style.fontWeight = "bold";
				enrollTitle.style.margin = "20px";
				enrollmentBox.appendChild(enrollTitle);

				const qrBox = document.createElement("div");
				qrBox.style.marginTop = "24px";
				enrollmentBox.appendChild(qrBox);

				const inputBox = document.createElement("div");
				inputBox.style.marginTop = "12px";
				inputBox.style.marginBottom = "12px";
				enrollmentBox.appendChild(inputBox);

				const optImage = document.createElement("img");
				optImage.src = "mono/mfa.svg";
				optImage.title = "OTP";
				optImage.width = 28;
				optImage.height = 28;
				inputBox.appendChild(optImage);

				const otpInput = document.createElement("input");
				otpInput.type = "text";
				otpInput.maxLength = 6;
				otpInput.style.fontSize = "16px";
				otpInput.style.fontWeight = "bold";
				otpInput.style.fontFamily = "monospace";
				otpInput.style.textAlign = "center";
				otpInput.style.letterSpacing = "12px";
				otpInput.style.color = "#202020";
				otpInput.style.backgroundColor = "rgb(224,224,224)";
				otpInput.style.boxShadow = "#202020 0 0 0 2px";
				inputBox.appendChild(otpInput);

				const otpLabel = document.createElement("span");
				otpLabel.style.fontWeight = "bold";
				otpLabel.style.margin = "16px 0";
				enrollmentBox.appendChild(otpLabel);

				enrollmentBox.appendChild(document.createElement("br"));

				const enrollButton = document.createElement("input");
				enrollButton.type = "button";
				enrollButton.value = "Enroll";
				enrollmentBox.appendChild(enrollButton);

				const qrLib = document.createElement("script");
				qrLib.src = "qrcode.js";
				document.body.appendChild(qrLib);

				qrLib.onload = ()=> {
					const label = `Pro-test:${usernameInput.value}`;
					new QRCode(qrBox, {
						text: `otpauth://totp/${label}?secret=${json.secret}&issuer=Pro-test`,
						width: 250,
						height: 250,
						colorDark: "#202020",
						colorLight: "transparent",
						correctLevel: QRCode.CorrectLevel.L
					});

					qrBox.childNodes[0].style.padding = "8px";
					qrBox.childNodes[0].style.border = "4px solid #202020";
					qrBox.childNodes[0].style.borderRadius = "8px";
				};

				otpInput.onkeyup = event=> {
					enrollButton.style.opacity = otpInput.value.length === 6 ? "1" : "0";
					if (event.key==="Enter") {
						TotpEnrollment(usernameInput.value, json.token, otpInput.value, otpLabel);
					}
				};

				enrollButton.onclick = ()=> {
					TotpEnrollment(usernameInput.value, json.token, otpInput.value, otpLabel);
				};

				otpInput.focus();
			}
			else if (json.status === 2) { //otp required
				usernameInput.setAttribute("readonly", true);
				passwordInput.setAttribute("readonly", true);
				otpBox.style.display = "block";
				otpInput.focus();
			}
			else {
				location.reload();
			}

			status = json.status;
		};

		const PrimaryLogin = async ()=> {
			if (usernameInput.value === "" || passwordInput.value === "") return;

			loginButton.setAttribute("disabled", true);
			busy = true;

			try {
				const response = await fetch("auth", {
					method: "POST",
					credentials: "same-origin",
					body: `${status}${String.fromCharCode(127)}${usernameInput.value}${String.fromCharCode(127)}${passwordInput.value}`
				});

				if (response.status === 202) {
					localStorage.setItem("last_username", usernameInput.value);

					const json = await response.json();
					token = json.token;
					HandleResponse(json);
				}
				else {
					passwordInput.value="";
					messageLabel.style.visibility="visible";
					messageLabel.style.animation="shake 1s 1";
					locklatch.style.animation="fail .4s 1";
					setTimeout(()=> {
						messageLabel.style.animation="none";
						locklatch.style.animation="none";
					}, 1000);
				}
				loginButton.removeAttribute("disabled");
				busy = false;
			}
			catch (ex) {
				messageLabel.style.visibility="visible";
				messageLabel.style.color="red";
				messageLabel.textContent="Server is unreachable.";
				console.error(ex);
				loginButton.removeAttribute("disabled");
				busy = false;
			}
		};

		const SecondaryLogin = async ()=> {
			if (otpInput.value.length != 6) return;

			busy = true;

			try {
				const response = await fetch("auth", {
					method: "POST",
					credentials: "same-origin",
					body: `2${String.fromCharCode(127)}${usernameInput.value}${String.fromCharCode(127)}${token}${String.fromCharCode(127)}${otpInput.value}`
				});

				if (response.status === 202) {
					const json = await response.json();
					HandleResponse(json);
				}
				else {
					messageLabel.textContent = "OTP challenge failed.";
					messageLabel.style.visibility="visible";
					messageLabel.style.animation="shake 1s 1";
					locklatch.style.animation="fail .4s 1";
					setTimeout(()=> {
						messageLabel.style.animation="none";
						locklatch.style.animation="none";
					}, 1000);
				}

				loginButton.removeAttribute("disabled");
				busy = false;
			}
			catch (ex) {
				messageLabel.style.visibility = "visible";
				messageLabel.style.color = "red";
				messageLabel.textContent = "Server is unreachable.";
				console.error(ex);
				loginButton.removeAttribute("disabled");
				busy = false;
			}
		};

		const TotpEnrollment = async (username, token, otp, label)=> {
			if (otp.length != 6) return;

			busy = true;

			try {
				const response = await fetch("auth", {
					method: "POST",
					credentials: "same-origin",
					body: `-1${String.fromCharCode(127)}${username}${String.fromCharCode(127)}${token}${String.fromCharCode(127)}${otp}`
				});

				if (response.status === 202) {
					const json = await response.json();
					HandleResponse(json);
				}
				else {
					label.textContent = "Enrollment failed. Please try again.";
					label.style.color="red";
					setTimeout(()=> {
						label.style.animation="none";
					}, 1000);
				}

				loginButton.removeAttribute("disabled");
				busy = false;
			}
			catch (ex) {
				label.style.visibility = "visible";
				label.style.color = "red";
				label.textContent = "Server is unreachable.";
				console.error(ex);
				loginButton.removeAttribute("disabled");
				busy = false;
			}
		};

	</script>
</body></html>
